<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Perpustakaan Digital | UKK 2025/2026</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700;800&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { 'sans': ['Inter', 'system-ui', 'sans-serif'] },
                    animation: { 'float': 'float 6s ease-in-out infinite' },
                    keyframes: { float: { '0%,100%': { transform: 'translateY(0px)' }, '50%': { transform: 'translateY(-10px)' } } }
                }
            }
        }
    </script>
    <style>
        /* Background pink aesthetic dengan gradasi lembut */
        .bg-gradient-main {
            background: linear-gradient(135deg, #fbc2eb 0%, #fdc5e6 25%, #f8a5c2 50%, #ffc3e0 100%);
            background-attachment: fixed;
        }
        .glass-card {
            background: rgba(255, 255, 255, 0.92);
            backdrop-filter: blur(12px);
            border-radius: 1.5rem;
            box-shadow: 0 20px 35px -10px rgba(0, 0, 0, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.6);
        }
        .btn-primary {
            background: linear-gradient(95deg, #e91e63, #c2185b);
            transition: all 0.2s;
        }
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px -5px #e91e6380;
        }
        .table-modern td, .table-modern th { padding: 12px 16px; border-bottom: 1px solid #ffe2f0; }
        .modal-bg { background: rgba(0,0,0,0.5); backdrop-filter: blur(4px); }
        /* Tabel hover lebih lembut */
        .table-modern tbody tr:hover { background: #fff0f5; }
        /* Scrollbar */
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: #ffe0f0; border-radius: 10px; }
        ::-webkit-scrollbar-thumb { background: #e91e63; border-radius: 10px; }
    </style>
    <script type="importmap">
        {
            "imports": {
                "firebase/app": "https://www.gstatic.com/firebasejs/10.4.0/firebase-app.js",
                "firebase/firestore": "https://www.gstatic.com/firebasejs/10.4.0/firebase-firestore.js"
            }
        }
    </script>
</head>
<body class="bg-gradient-main font-sans text-gray-800 min-h-screen">
    <!-- Floating decorative elements dengan warna pink pastel -->
    <div class="fixed inset-0 overflow-hidden pointer-events-none z-0">
        <div class="absolute top-20 left-10 w-72 h-72 bg-pink-200 rounded-full mix-blend-multiply filter blur-3xl opacity-40 animate-float"></div>
        <div class="absolute bottom-20 right-10 w-80 h-80 bg-rose-200 rounded-full mix-blend-multiply filter blur-3xl opacity-40 animate-float" style="animation-delay: -2s;"></div>
        <div class="absolute top-1/2 left-1/3 w-60 h-60 bg-fuchsia-200 rounded-full mix-blend-multiply filter blur-3xl opacity-30 animate-float" style="animation-delay: -4s;"></div>
    </div>

    <div id="app" class="relative z-10 container mx-auto px-4 py-6 max-w-7xl">
        <!-- Login Section -->
        <div id="authSection" class="flex justify-center items-center min-h-[80vh]">
            <div class="glass-card w-full max-w-md p-8">
                <div class="text-center mb-6">
                    <i class="fas fa-book-open text-5xl text-pink-600 drop-shadow"></i>
                    <h2 class="text-3xl font-bold mt-2 text-pink-800">Perpustakaan Digital</h2>
                    <p class="text-pink-600">SMK Insan Cemerlang</p>
                </div>
                <div class="flex gap-2 mb-6 bg-pink-100 p-1 rounded-xl">
                    <button id="loginTabBtn" class="w-1/2 py-2 font-semibold rounded-lg bg-white text-pink-600 shadow-sm">Login</button>
                    <button id="registerTabBtn" class="w-1/2 py-2 font-semibold rounded-lg text-pink-500">Daftar Anggota</button>
                </div>
                <div id="loginForm">
                    <input type="text" id="loginUsername" placeholder="Username" class="w-full mb-3 p-3 border border-pink-200 rounded-xl focus:ring-2 focus:ring-pink-400">
                    <input type="password" id="loginPassword" placeholder="Password" class="w-full mb-4 p-3 border border-pink-200 rounded-xl focus:ring-2 focus:ring-pink-400">
                    <button id="doLoginBtn" class="w-full btn-primary text-white py-3 rounded-xl font-bold shadow-lg">Masuk</button>
                </div>
                <div id="registerForm" class="hidden">
                    <input type="text" id="regName" placeholder="Nama Lengkap" class="w-full mb-2 p-2 border border-pink-200 rounded">
                    <input type="text" id="regClass" placeholder="Kelas" class="w-full mb-2 p-2 border border-pink-200 rounded">
                    <input type="text" id="regPhone" placeholder="Telepon" class="w-full mb-2 p-2 border border-pink-200 rounded">
                    <input type="text" id="regUsername" placeholder="Username" class="w-full mb-2 p-2 border border-pink-200 rounded">
                    <input type="password" id="regPassword" placeholder="Password" class="w-full mb-3 p-2 border border-pink-200 rounded">
                    <button id="doRegisterBtn" class="w-full bg-pink-500 hover:bg-pink-600 text-white py-2 rounded font-bold">Daftar</button>
                </div>
                <p class="text-xs text-center text-pink-500 mt-6">Demo: admin/admin123 | atau daftar sebagai anggota</p>
            </div>
        </div>

        <!-- Dashboard Utama -->
        <div id="dashboardSection" class="hidden">
            <div class="glass-card p-4 flex flex-wrap justify-between items-center mb-6">
                <div class="flex items-center gap-3">
                    <i class="fas fa-landmark text-3xl text-pink-700"></i>
                    <div>
                        <h1 class="text-2xl font-bold text-pink-800">Perpustakaan Digital</h1>
                        <p class="text-pink-700">Halo, <span id="userNameDisplay"></span> · <span id="userRoleBadge" class="bg-pink-100 text-pink-700 px-2 py-0.5 rounded-full text-sm"></span></p>
                    </div>
                </div>
                <button id="logoutBtn" class="bg-pink-500 hover:bg-pink-600 text-white px-4 py-2 rounded-full shadow"><i class="fas fa-sign-out-alt"></i> Logout</button>
            </div>
            <div id="navTabs" class="flex flex-wrap gap-2 mb-6"></div>
            <div id="contentPanel" class="glass-card p-5 min-h-[500px]"><div class="text-center text-pink-500">Memuat...</div></div>
        </div>
    </div>

    <!-- Modal Global untuk Form (Tambah/Edit) -->
    <div id="modalForm" class="fixed inset-0 flex items-center justify-center z-50 hidden modal-bg transition-all">
        <div class="bg-white rounded-2xl w-full max-w-md p-6 shadow-2xl transform transition-all">
            <div class="flex justify-between items-center mb-4"><h3 id="modalTitle" class="text-xl font-bold text-pink-700"></h3><button id="closeModalBtn" class="text-gray-400 hover:text-gray-600"><i class="fas fa-times"></i></button></div>
            <div id="modalBody"></div>
            <div class="mt-5 flex justify-end gap-2"><button id="modalCancelBtn" class="px-4 py-2 border border-pink-300 rounded-lg text-pink-600">Batal</button><button id="modalConfirmBtn" class="px-4 py-2 bg-pink-500 text-white rounded-lg hover:bg-pink-600">Simpan</button></div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from 'firebase/app';
        import { 
            getFirestore, collection, doc, getDocs, getDoc, addDoc, 
            deleteDoc, updateDoc, query, orderBy, where 
        } from 'firebase/firestore';

        const firebaseConfig = {
            apiKey: "AIzaSyDmI0zRauvzaL4oEuXinkmXhGiwTsYxYQc",
            authDomain: "insan-cemerlang-ee7af.firebaseapp.com",
            projectId: "insan-cemerlang-ee7af",
            storageBucket: "insan-cemerlang-ee7af.appspot.com",
            messagingSenderId: "1047091827759",
            appId: "1:1047091827759:web:0f1742d6f3922f856de2da",
            measurementId: "G-GL8J5GC8XB"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        const booksCol = collection(db, "books");
        const membersCol = collection(db, "members");
        const usersCol = collection(db, "users");
        const loansCol = collection(db, "loans");
        const returnsCol = collection(db, "returns");

        let currentUser = null;
        let modalCallback = null;

        function showToast(msg, type = "success") {
            const toast = document.createElement("div");
            toast.className = `fixed bottom-5 right-5 z-50 px-5 py-3 rounded-xl shadow-lg text-white font-medium flex items-center gap-2 ${type === 'error' ? 'bg-red-500' : 'bg-pink-500'}`;
            toast.innerHTML = `<i class="fas ${type === 'error' ? 'fa-exclamation-circle' : 'fa-check-circle'}"></i> ${msg}`;
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 3000);
        }

        function formatDate(dateObj) { if (!dateObj) return '-'; return new Date(dateObj).toLocaleDateString('id-ID'); }
        function getDueDate(loanDate) { const due = new Date(loanDate); due.setDate(due.getDate() + 7); return due.toISOString(); }
        function isOverdue(dueDate) { return new Date() > new Date(dueDate); }

        async function seedInitialData() {
            const adminQuery = query(usersCol, where("username", "==", "admin"));
            if ((await getDocs(adminQuery)).empty) await addDoc(usersCol, { username: "admin", password: "admin123", role: "admin", memberId: null });
            if ((await getDocs(booksCol)).empty) {
                await addDoc(booksCol, { title: "Pemrograman Web Modern", publisher: "Gramedia", totalStock: 5, availableStock: 5, cover: "📘", isbn: "-", location: "Rak A1" });
                await addDoc(booksCol, { title: "Database Sistem", publisher: "Informatika", totalStock: 3, availableStock: 3, cover: "📗", isbn: "-", location: "Rak B2" });
                await addDoc(booksCol, { title: "UI/UX Design", publisher: "Andi Offset", totalStock: 4, availableStock: 4, cover: "🎨", isbn: "-", location: "Rak C3" });
            }
            if ((await getDocs(membersCol)).empty) {
                const m1 = await addDoc(membersCol, { name: "Ahmad Rizki", className: "XI RPL 1", phone: "08123456789", registerDate: new Date().toISOString(), address: "-" });
                const m2 = await addDoc(membersCol, { name: "Dewi Lestari", className: "XII RPL 2", phone: "08234567890", registerDate: new Date().toISOString(), address: "-" });
                await addDoc(usersCol, { username: "ahmad", password: "ahmad123", role: "member", memberId: m1.id });
                await addDoc(usersCol, { username: "dewi", password: "dewi123", role: "member", memberId: m2.id });
            }
        }
        seedInitialData().catch(console.error);

        async function handleLogin(username, password) {
            const q = query(usersCol, where("username", "==", username), where("password", "==", password));
            const snap = await getDocs(q);
            if (snap.empty) { showToast("Login gagal", "error"); return false; }
            currentUser = { id: snap.docs[0].id, ...snap.docs[0].data() };
            localStorage.setItem("perpustakaan_user", JSON.stringify({ id: currentUser.id, username: currentUser.username, role: currentUser.role, memberId: currentUser.memberId }));
            showToast(`Selamat datang ${currentUser.username}`);
            renderDashboard();
            return true;
        }

        async function handleRegister(name, className, phone, username, password) {
            const existing = await getDocs(query(usersCol, where("username", "==", username)));
            if (!existing.empty) { showToast("Username sudah dipakai", "error"); return false; }
            const memberRef = await addDoc(membersCol, { name, className, phone, registerDate: new Date().toISOString(), address: "-" });
            await addDoc(usersCol, { username, password, role: "member", memberId: memberRef.id });
            showToast("Registrasi berhasil, silakan login");
            return true;
        }

        async function loadBooks() { return (await getDocs(query(booksCol, orderBy("title")))).docs.map(d => ({ id: d.id, ...d.data() })); }
        async function loadMembers() { return (await getDocs(query(membersCol, orderBy("name")))).docs.map(d => ({ id: d.id, ...d.data() })); }
        async function loadLoans() {
            const snap = await getDocs(query(loansCol, orderBy("loanDate", "desc")));
            const loans = [];
            for (const ds of snap.docs) {
                const loan = ds.data();
                const book = await getDoc(doc(booksCol, loan.bookId));
                const member = await getDoc(doc(membersCol, loan.memberId));
                loans.push({ id: ds.id, ...loan, bookTitle: book.exists() ? book.data().title : "-", bookCover: book.exists() ? book.data().cover : "📖", memberName: member.exists() ? member.data().name : "-" });
            }
            return loans;
        }
        async function loadReturns() {
            const snap = await getDocs(query(returnsCol, orderBy("returnDate", "desc")));
            const rets = [];
            for (const ds of snap.docs) {
                const ret = ds.data();
                const loan = await getDoc(doc(loansCol, ret.loanId));
                if (loan.exists()) {
                    const loanData = loan.data();
                    const book = await getDoc(doc(booksCol, loanData.bookId));
                    const member = await getDoc(doc(membersCol, loanData.memberId));
                    rets.push({ id: ds.id, ...ret, bookTitle: book.exists() ? book.data().title : "-", memberName: member.exists() ? member.data().name : "-", loanDate: loanData.loanDate });
                }
            }
            return rets;
        }

        function openModal(title, bodyHtml, onConfirm) {
            document.getElementById("modalTitle").innerText = title;
            document.getElementById("modalBody").innerHTML = bodyHtml;
            document.getElementById("modalForm").classList.remove("hidden");
            modalCallback = onConfirm;
        }
        function closeModal() { document.getElementById("modalForm").classList.add("hidden"); modalCallback = null; }
        document.getElementById("closeModalBtn").onclick = closeModal;
        document.getElementById("modalCancelBtn").onclick = closeModal;
        document.getElementById("modalConfirmBtn").onclick = () => { if (modalCallback) modalCallback(); closeModal(); };

        async function renderDashboard() {
            document.getElementById("authSection").classList.add("hidden");
            document.getElementById("dashboardSection").classList.remove("hidden");
            document.getElementById("userNameDisplay").innerText = currentUser.username;
            document.getElementById("userRoleBadge").innerHTML = currentUser.role === 'admin' ? '<i class="fas fa-shield-alt"></i> Admin' : '<i class="fas fa-user-graduate"></i> Anggota';
            const navTabs = document.getElementById("navTabs");
            navTabs.innerHTML = "";
            if (currentUser.role === 'admin') {
                const menus = [
                    { id: "adminBooks", label: "📚 Buku", icon: "fa-book" },
                    { id: "adminMembers", label: "👥 Anggota", icon: "fa-users" },
                    { id: "adminLoans", label: "📋 Peminjaman", icon: "fa-hand-holding" },
                    { id: "adminReturns", label: "🔄 Pengembalian", icon: "fa-undo-alt" }
                ];
                menus.forEach(menu => {
                    const btn = document.createElement("button");
                    btn.className = "px-4 py-2 rounded-full bg-white/30 hover:bg-white/50 text-pink-800 font-medium transition flex items-center gap-2 backdrop-blur-sm";
                    btn.innerHTML = `<i class="fas ${menu.icon}"></i> ${menu.label}`;
                    btn.onclick = () => renderAdminContent(menu.id);
                    navTabs.appendChild(btn);
                });
                renderAdminContent("adminBooks");
            } else {
                const menus = [
                    { id: "userBorrow", label: "📖 Pinjam Buku", icon: "fa-hand-holding-heart" },
                    { id: "userLoans", label: "📌 Peminjaman Saya", icon: "fa-list" },
                    { id: "userReturn", label: "🔄 Kembalikan Buku", icon: "fa-undo" }
                ];
                menus.forEach(menu => {
                    const btn = document.createElement("button");
                    btn.className = "px-4 py-2 rounded-full bg-white/30 hover:bg-white/50 text-pink-800 font-medium transition flex items-center gap-2 backdrop-blur-sm";
                    btn.innerHTML = `<i class="fas ${menu.icon}"></i> ${menu.label}`;
                    btn.onclick = () => renderUserContent(menu.id);
                    navTabs.appendChild(btn);
                });
                renderUserContent("userBorrow");
            }
        }

        // ==================== ADMIN ====================
        async function renderAdminContent(section) {
            const container = document.getElementById("contentPanel");
            if (section === "adminBooks") await renderAdminBooks(container);
            else if (section === "adminMembers") await renderAdminMembers(container);
            else if (section === "adminLoans") await renderAdminLoans(container);
            else if (section === "adminReturns") await renderAdminReturns(container);
        }

        async function renderAdminBooks(container) {
            let books = await loadBooks();
            container.innerHTML = `
                <div class="flex justify-between items-center mb-4"><h2 class="text-2xl font-bold text-pink-700"><i class="fas fa-book text-pink-500"></i> Manajemen Buku</h2><button id="addBookBtn" class="bg-pink-500 hover:bg-pink-600 text-white px-4 py-2 rounded-xl shadow"><i class="fas fa-plus"></i> Tambah Buku</button></div>
                <div class="overflow-x-auto"><table class="w-full table-modern bg-white/70 rounded-xl"><thead class="bg-pink-50"><tr><th>Cover</th><th>Judul</th><th>Penerbit</th><th>Stok Total</th><th>Stok Tersedia</th><th>Aksi</th></tr></thead><tbody id="booksTableBody"></tbody></table></div>
            `;
            const renderTable = () => {
                document.getElementById("booksTableBody").innerHTML = books.map(b => `
                    <tr><td class="text-3xl text-center">${b.cover || '📖'}</td>
                        <td class="font-medium">${b.title}</td>
                        <td class="font-medium">${b.publisher || '-'}</td>
                        <td class="font-medium">${b.totalStock}</td>
                        <td class="font-medium">${b.availableStock}</td>
                        <td class="font-medium"><button data-id="${b.id}" class="editBookBtn text-pink-600 mr-2"><i class="fas fa-edit"></i></button><button data-id="${b.id}" class="deleteBookBtn text-red-500"><i class="fas fa-trash"></i></button></td>
                    </tr>
                `).join('');
                document.querySelectorAll(".editBookBtn").forEach(btn => btn.onclick = () => editBook(btn.dataset.id));
                document.querySelectorAll(".deleteBookBtn").forEach(btn => btn.onclick = () => deleteBook(btn.dataset.id));
            };
            renderTable();
            document.getElementById("addBookBtn").onclick = () => {
                openModal("Tambah Buku", `
                    <div class="mb-3"><label>Cover (icon/emoji)</label><input id="bookCover" class="w-full border rounded p-2" placeholder="📚" value="📚"></div>
                    <div class="mb-3"><label>Judul Buku</label><input id="bookTitle" class="w-full border rounded p-2"></div>
                    <div class="mb-3"><label>Penerbit</label><input id="bookPublisher" class="w-full border rounded p-2"></div>
                    <div class="mb-3"><label>Stok Total</label><input id="bookStock" type="number" class="w-full border rounded p-2"></div>
                `, async () => {
                    const cover = document.getElementById("bookCover").value || "📚";
                    const title = document.getElementById("bookTitle").value;
                    const publisher = document.getElementById("bookPublisher").value;
                    const totalStock = parseInt(document.getElementById("bookStock").value);
                    if (!title || isNaN(totalStock)) { showToast("Data tidak lengkap", "error"); return; }
                    await addDoc(booksCol, { title, publisher, totalStock, availableStock: totalStock, cover, isbn: "-", location: "-" });
                    showToast("Buku ditambahkan");
                    books = await loadBooks();
                    renderTable();
                });
            };
            window.editBook = async (id) => {
                const ref = doc(booksCol, id);
                const data = (await getDoc(ref)).data();
                openModal("Edit Buku", `
                    <div class="mb-3"><label>Cover (icon/emoji)</label><input id="bookCover" class="w-full border rounded p-2" value="${data.cover || '📚'}"></div>
                    <div class="mb-3"><label>Judul</label><input id="bookTitle" class="w-full border rounded p-2" value="${data.title}"></div>
                    <div class="mb-3"><label>Penerbit</label><input id="bookPublisher" class="w-full border rounded p-2" value="${data.publisher || ''}"></div>
                    <div class="mb-3"><label>Stok Total</label><input id="bookStock" type="number" class="w-full border rounded p-2" value="${data.totalStock}"></div>
                `, async () => {
                    const newCover = document.getElementById("bookCover").value || "📚";
                    const newTitle = document.getElementById("bookTitle").value;
                    const newPub = document.getElementById("bookPublisher").value;
                    const newTotal = parseInt(document.getElementById("bookStock").value);
                    if (!newTitle || isNaN(newTotal)) return;
                    const diff = newTotal - data.totalStock;
                    const newAvailable = data.availableStock + diff;
                    await updateDoc(ref, { cover: newCover, title: newTitle, publisher: newPub, totalStock: newTotal, availableStock: newAvailable });
                    showToast("Buku diupdate");
                    books = await loadBooks();
                    renderTable();
                });
            };
            window.deleteBook = async (id) => { if (confirm("Hapus buku?")) { await deleteDoc(doc(booksCol, id)); showToast("Buku dihapus"); books = await loadBooks(); renderTable(); } };
        }

        async function renderAdminMembers(container) {
            let members = await loadMembers();
            container.innerHTML = `
                <div class="flex justify-between items-center mb-4"><h2 class="text-2xl font-bold text-pink-700"><i class="fas fa-users text-pink-500"></i> Manajemen Anggota</h2><button id="addMemberBtn" class="bg-pink-500 hover:bg-pink-600 text-white px-4 py-2 rounded-xl shadow"><i class="fas fa-user-plus"></i> Tambah Anggota</button></div>
                <div class="overflow-x-auto"><table class="w-full table-modern bg-white/70 rounded-xl"><thead class="bg-pink-50"><tr><th>Nama</th><th>Kelas</th><th>Telepon</th><th>Tanggal Daftar</th><th>Aksi</th></tr></thead><tbody id="membersTableBody"></tbody></table></div>
            `;
            const renderTable = () => {
                document.getElementById("membersTableBody").innerHTML = members.map(m => `
                    <tr><td class="font-medium">${m.name}</td><td class="font-medium">${m.className}</td><td class="font-medium">${m.phone}</td><td class="font-medium">${formatDate(m.registerDate)}</td><td class="font-medium"><button data-id="${m.id}" class="editMemberBtn text-pink-600 mr-2"><i class="fas fa-edit"></i></button><button data-id="${m.id}" class="deleteMemberBtn text-red-500"><i class="fas fa-trash"></i></button></td></tr>
                `).join('');
                document.querySelectorAll(".editMemberBtn").forEach(btn => btn.onclick = () => editMember(btn.dataset.id));
                document.querySelectorAll(".deleteMemberBtn").forEach(btn => btn.onclick = () => deleteMember(btn.dataset.id));
            };
            renderTable();
            document.getElementById("addMemberBtn").onclick = () => {
                openModal("Tambah Anggota", `
                    <div class="mb-3"><label>Nama Lengkap</label><input id="memberName" class="w-full border rounded p-2"></div>
                    <div class="mb-3"><label>Kelas</label><input id="memberClass" class="w-full border rounded p-2"></div>
                    <div class="mb-3"><label>Telepon</label><input id="memberPhone" class="w-full border rounded p-2"></div>
                    <div class="mb-3"><label>Username (untuk login)</label><input id="memberUsername" class="w-full border rounded p-2"></div>
                    <div class="mb-3"><label>Password</label><input id="memberPassword" type="password" class="w-full border rounded p-2"></div>
                `, async () => {
                    const name = document.getElementById("memberName").value;
                    const className = document.getElementById("memberClass").value;
                    const phone = document.getElementById("memberPhone").value;
                    const username = document.getElementById("memberUsername").value;
                    const password = document.getElementById("memberPassword").value;
                    if (!name || !className || !username || !password) { showToast("Isi semua field", "error"); return; }
                    const existing = await getDocs(query(usersCol, where("username", "==", username)));
                    if (!existing.empty) { showToast("Username sudah ada", "error"); return; }
                    const memberRef = await addDoc(membersCol, { name, className, phone, registerDate: new Date().toISOString(), address: "-" });
                    await addDoc(usersCol, { username, password, role: "member", memberId: memberRef.id });
                    showToast("Anggota dan akun berhasil dibuat");
                    members = await loadMembers();
                    renderTable();
                });
            };
            window.editMember = async (id) => {
                const ref = doc(membersCol, id);
                const data = (await getDoc(ref)).data();
                openModal("Edit Anggota", `
                    <div class="mb-3"><label>Nama</label><input id="memberName" class="w-full border rounded p-2" value="${data.name}"></div>
                    <div class="mb-3"><label>Kelas</label><input id="memberClass" class="w-full border rounded p-2" value="${data.className}"></div>
                    <div class="mb-3"><label>Telepon</label><input id="memberPhone" class="w-full border rounded p-2" value="${data.phone}"></div>
                `, async () => {
                    const newName = document.getElementById("memberName").value;
                    const newClass = document.getElementById("memberClass").value;
                    const newPhone = document.getElementById("memberPhone").value;
                    if (newName) await updateDoc(ref, { name: newName, className: newClass, phone: newPhone });
                    showToast("Anggota diperbarui");
                    members = await loadMembers();
                    renderTable();
                });
            };
            window.deleteMember = async (id) => { if (confirm("Hapus anggota?")) { await deleteDoc(doc(membersCol, id)); showToast("Anggota dihapus"); members = await loadMembers(); renderTable(); } };
        }

        async function renderAdminLoans(container) {
            let loans = await loadLoans();
            const books = await loadBooks();
            const members = await loadMembers();
            container.innerHTML = `
                <h2 class="text-2xl font-bold mb-3 text-pink-700"><i class="fas fa-hand-holding text-pink-500"></i> Data Peminjaman</h2>
                <button id="newLoanBtn" class="bg-pink-500 hover:bg-pink-600 text-white px-4 py-2 rounded-xl shadow mb-4"><i class="fas fa-plus"></i> Peminjaman Baru</button>
                <div class="overflow-x-auto"><table class="w-full table-modern bg-white/70 rounded-xl"><thead class="bg-pink-50"><tr><th>Cover</th><th>Peminjam</th><th>Buku</th><th>Tgl Pinjam</th><th>Jatuh Tempo</th><th>Status</th><th>Aksi</th></tr></thead><tbody id="loansTableBody"></tbody></table></div>
            `;
            const renderTable = () => {
                document.getElementById("loansTableBody").innerHTML = loans.map(l => {
                    const overdue = l.status === 'borrowed' && isOverdue(l.dueDate);
                    const statusText = l.status === 'returned' ? 'Dikembalikan' : (overdue ? 'Terlambat' : 'Dipinjam');
                    const statusClass = l.status === 'returned' ? 'bg-green-100 text-green-700' : (overdue ? 'bg-red-100 text-red-700' : 'bg-yellow-100 text-yellow-700');
                    return `<tr><td class="text-2xl">${l.bookCover || '📖'}</td><td class="font-medium">${l.memberName}</td><td class="font-medium">${l.bookTitle}</td><td class="font-medium">${formatDate(l.loanDate)}</td><td class="font-medium">${formatDate(l.dueDate)}</td><td class="font-medium"><span class="px-2 py-1 rounded-full text-xs ${statusClass}">${statusText}</span></td><td class="font-medium">
                        ${l.status === 'borrowed' ? `
                            <button data-id="${l.id}" class="extendLoanBtn bg-green-600 text-white px-2 py-1 rounded mr-1" title="Perpanjang Jatuh Tempo"><i class="fas fa-calendar-plus"></i> Perpanjang</button>
                            <button data-id="${l.id}" class="returnLoanBtn bg-blue-500 text-white px-2 py-1 rounded">Kembalikan</button>
                        ` : '-'}
                    </td></tr>`;
                }).join('');
                document.querySelectorAll(".returnLoanBtn").forEach(btn => btn.onclick = () => processReturn(btn.dataset.id));
                document.querySelectorAll(".extendLoanBtn").forEach(btn => btn.onclick = () => openExtendModal(btn.dataset.id));
            };
            renderTable();
            document.getElementById("newLoanBtn").onclick = () => {
                openModal("Peminjaman Baru", `
                    <div class="mb-3"><label>Pilih Anggota</label><select id="loanMember" class="w-full border rounded p-2">${members.map(m => `<option value="${m.id}">${m.name} (${m.className})</option>`).join('')}</select></div>
                    <div class="mb-3"><label>Pilih Buku</label><select id="loanBook" class="w-full border rounded p-2">${books.map(b => `<option value="${b.id}">${b.cover || '📖'} ${b.title} (Stok: ${b.availableStock})</option>`).join('')}</select></div>
                `, async () => {
                    const memberId = document.getElementById("loanMember").value;
                    const bookId = document.getElementById("loanBook").value;
                    const bookRef = doc(booksCol, bookId);
                    const bookSnap = await getDoc(bookRef);
                    if (bookSnap.data().availableStock <= 0) { showToast("Stok buku habis", "error"); return; }
                    const loanDate = new Date().toISOString();
                    const dueDate = getDueDate(loanDate);
                    await addDoc(loansCol, { bookId, memberId, loanDate, dueDate, status: "borrowed" });
                    await updateDoc(bookRef, { availableStock: bookSnap.data().availableStock - 1 });
                    showToast("Peminjaman berhasil");
                    loans = await loadLoans();
                    renderTable();
                });
            };
            window.openExtendModal = (loanId) => {
                openModal("Perpanjang Jatuh Tempo", `
                    <div class="mb-3"><label>Pilih Tanggal Jatuh Tempo Baru</label><input type="date" id="newDueDate" class="w-full border rounded p-2" value="${new Date().toISOString().slice(0,10)}"></div>
                    <p class="text-sm text-gray-500">Anda bebas menentukan tanggal berapa pun.</p>
                `, async () => {
                    const newDateStr = document.getElementById("newDueDate").value;
                    if (!newDateStr) { showToast("Pilih tanggal terlebih dahulu", "error"); return; }
                    const newDue = new Date(newDateStr);
                    if (isNaN(newDue.getTime())) { showToast("Tanggal tidak valid", "error"); return; }
                    const loanRef = doc(loansCol, loanId);
                    const loanSnap = await getDoc(loanRef);
                    if (!loanSnap.exists() || loanSnap.data().status !== 'borrowed') {
                        showToast("Peminjaman sudah dikembalikan atau tidak ditemukan", "error");
                        return;
                    }
                    await updateDoc(loanRef, { dueDate: newDue.toISOString() });
                    showToast(`Jatuh tempo diperpanjang menjadi ${formatDate(newDue)}`);
                    loans = await loadLoans();
                    renderTable();
                });
            };
            window.processReturn = async (loanId) => {
                const loanRef = doc(loansCol, loanId);
                const loan = await getDoc(loanRef);
                if (!loan.exists() || loan.data().status === 'returned') return;
                await addDoc(returnsCol, { loanId, returnDate: new Date().toISOString(), lateFee: 0 });
                await updateDoc(loanRef, { status: "returned", returnDate: new Date().toISOString() });
                const bookRef = doc(booksCol, loan.data().bookId);
                const bookSnap = await getDoc(bookRef);
                if (bookSnap.exists()) await updateDoc(bookRef, { availableStock: bookSnap.data().availableStock + 1 });
                showToast("Pengembalian dicatat");
                loans = await loadLoans();
                renderTable();
            };
        }

        async function renderAdminReturns(container) {
            let returns = await loadReturns();
            container.innerHTML = `<h2 class="text-2xl font-bold mb-3 text-pink-700"><i class="fas fa-undo-alt text-pink-500"></i> Data Pengembalian</h2><div class="overflow-x-auto"><table class="w-full table-modern bg-white/70 rounded-xl"><thead class="bg-pink-50"><tr><th>Peminjam</th><th>Buku</th><th>Tgl Pinjam</th><th>Tgl Kembali</th><th>Denda</th></tr></thead><tbody>${returns.map(r => `<tr><td class="font-medium">${r.memberName}</td><td class="font-medium">${r.bookTitle}</td><td class="font-medium">${formatDate(r.loanDate)}</td><td class="font-medium">${formatDate(r.returnDate)}</td><td class="font-medium">Rp0</td></tr>`).join('')}</tbody></table></div>`;
        }

        // ==================== USER ====================
        async function renderUserContent(section) {
            const container = document.getElementById("contentPanel");
            if (section === "userBorrow") await renderUserBorrow(container);
            else if (section === "userLoans") await renderUserLoans(container);
            else if (section === "userReturn") await renderUserReturn(container);
        }

        async function renderUserBorrow(container) {
            if (!currentUser.memberId) { container.innerHTML = `<div class="bg-red-100 p-4 rounded-xl text-red-700">Akun tidak valid</div>`; return; }
            let books = await loadBooks();
            container.innerHTML = `<h2 class="text-2xl font-bold mb-3 text-pink-700"><i class="fas fa-book-open text-pink-500"></i> Peminjaman Buku</h2><input id="searchBookUser" placeholder="Cari judul..." class="border border-pink-200 p-2 rounded w-full md:w-64 mb-4"><div id="bookListUser" class="grid md:grid-cols-2 lg:grid-cols-3 gap-4"></div>`;
            const renderBooks = (bk) => {
                document.getElementById("bookListUser").innerHTML = bk.map(b => `
                    <div class="bg-white/80 p-4 rounded-2xl shadow text-center">
                        <div class="text-5xl mb-2">${b.cover || '📖'}</div>
                        <h3 class="font-bold text-lg">${b.title}</h3>
                        <p class="text-sm">${b.publisher}</p>
                        <p class="text-sm mt-1">Tersedia: ${b.availableStock}</p>
                        ${b.availableStock > 0 ? `<button data-id="${b.id}" class="borrowUserBtn mt-3 w-full bg-pink-500 hover:bg-pink-600 text-white py-2 rounded-xl">Pinjam</button>` : '<button disabled class="mt-3 w-full bg-gray-300 py-2 rounded-xl">Stok Habis</button>'}
                    </div>
                `).join('');
                document.querySelectorAll(".borrowUserBtn").forEach(btn => btn.onclick = () => userBorrowBook(btn.dataset.id));
            };
            renderBooks(books);
            document.getElementById("searchBookUser").addEventListener("input", (e) => renderBooks(books.filter(b => b.title.toLowerCase().includes(e.target.value.toLowerCase()))));
            window.userBorrowBook = async (bookId) => {
                const bookRef = doc(booksCol, bookId);
                const book = await getDoc(bookRef);
                if (book.data().availableStock <= 0) return showToast("Stok habis", "error");
                const existing = await getDocs(query(loansCol, where("memberId", "==", currentUser.memberId), where("bookId", "==", bookId), where("status", "==", "borrowed")));
                if (!existing.empty) return showToast("Anda masih meminjam buku ini", "error");
                const loanDate = new Date().toISOString();
                const dueDate = getDueDate(loanDate);
                await addDoc(loansCol, { bookId, memberId: currentUser.memberId, loanDate, dueDate, status: "borrowed" });
                await updateDoc(bookRef, { availableStock: book.data().availableStock - 1 });
                showToast(`Buku dipinjam, jatuh tempo ${formatDate(dueDate)}`);
                renderUserBorrow(container);
            };
        }

        async function renderUserLoans(container) {
            if (!currentUser.memberId) return;
            let all = await loadLoans();
            const myLoans = all.filter(l => l.memberId === currentUser.memberId);
            container.innerHTML = `<h2 class="text-2xl font-bold mb-3 text-pink-700">Peminjaman Saya</h2><div class="overflow-x-auto"><table class="w-full table-modern bg-white/70 rounded-xl"><thead class="bg-pink-50"><tr><th>Cover</th><th>Buku</th><th>Tgl Pinjam</th><th>Jatuh Tempo</th><th>Status</th></tr></thead><tbody>${myLoans.map(l => { const overdue = l.status === 'borrowed' && isOverdue(l.dueDate); const status = l.status === 'returned' ? 'Dikembalikan' : (overdue ? 'Terlambat' : 'Dipinjam'); return `<tr><td class="text-2xl">${l.bookCover || '📖'}</td><td class="font-medium">${l.bookTitle}</td><td class="font-medium">${formatDate(l.loanDate)}</td><td class="font-medium">${formatDate(l.dueDate)}</td><td class="font-medium">${status}</td></tr>`; }).join('')}</tbody></table></div>`;
        }

        async function renderUserReturn(container) {
            if (!currentUser.memberId) return;
            let all = await loadLoans();
            const active = all.filter(l => l.memberId === currentUser.memberId && l.status === "borrowed");
            container.innerHTML = `<h2 class="text-2xl font-bold mb-3 text-pink-700">Kembalikan Buku</h2><div class="grid gap-3">${active.length === 0 ? '<div class="bg-white/50 p-4 rounded-xl">Tidak ada buku yang dipinjam</div>' : active.map(l => `<div class="bg-white/80 p-4 rounded-xl flex justify-between items-center"><div><div class="text-2xl inline-block mr-2">${l.bookCover || '📖'}</div><b>${l.bookTitle}</b><br><small>Jatuh tempo: ${formatDate(l.dueDate)}</small></div><button data-id="${l.id}" class="returnUserBtn bg-pink-500 hover:bg-pink-600 text-white px-4 py-2 rounded-xl">Kembalikan</button></div>`).join('')}</div>`;
            document.querySelectorAll(".returnUserBtn").forEach(btn => btn.onclick = async () => {
                const loanId = btn.dataset.id;
                const loanRef = doc(loansCol, loanId);
                const loan = await getDoc(loanRef);
                if (loan.data().status === 'returned') return;
                await addDoc(returnsCol, { loanId, returnDate: new Date().toISOString(), lateFee: 0 });
                await updateDoc(loanRef, { status: "returned", returnDate: new Date().toISOString() });
                const bookRef = doc(booksCol, loan.data().bookId);
                const book = await getDoc(bookRef);
                if (book.exists()) await updateDoc(bookRef, { availableStock: book.data().availableStock + 1 });
                showToast("Buku dikembalikan");
                renderUserReturn(container);
            });
        }

        // Event listeners
        document.getElementById("doLoginBtn").onclick = () => handleLogin(document.getElementById("loginUsername").value, document.getElementById("loginPassword").value);
        document.getElementById("doRegisterBtn").onclick = () => handleRegister(document.getElementById("regName").value, document.getElementById("regClass").value, document.getElementById("regPhone").value, document.getElementById("regUsername").value, document.getElementById("regPassword").value);
        document.getElementById("loginTabBtn").onclick = () => { document.getElementById("loginForm").classList.remove("hidden"); document.getElementById("registerForm").classList.add("hidden"); document.getElementById("loginTabBtn").classList.add("bg-white","text-pink-600"); document.getElementById("registerTabBtn").classList.remove("bg-white","text-pink-600"); };
        document.getElementById("registerTabBtn").onclick = () => { document.getElementById("registerForm").classList.remove("hidden"); document.getElementById("loginForm").classList.add("hidden"); document.getElementById("registerTabBtn").classList.add("bg-white","text-pink-600"); document.getElementById("loginTabBtn").classList.remove("bg-white","text-pink-600"); };
        document.getElementById("logoutBtn").onclick = () => { localStorage.removeItem("perpustakaan_user"); currentUser = null; document.getElementById("authSection").classList.remove("hidden"); document.getElementById("dashboardSection").classList.add("hidden"); };
        const saved = localStorage.getItem("perpustakaan_user");
        if (saved) { currentUser = JSON.parse(saved); renderDashboard(); } else { document.getElementById("authSection").classList.remove("hidden"); document.getElementById("dashboardSection").classList.add("hidden"); }
    </script>
</body>
</html>
